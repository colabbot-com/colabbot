services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - registry
    restart: unless-stopped

  registry:
    build: .
    expose:
      - "8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://colabbot:${DB_PASSWORD:-colabbot}@db:5432/colabbot
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: colabbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-colabbot}
      POSTGRES_DB: colabbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colabbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:     # stores Let's Encrypt certificates — persists across restarts
  caddy_config:
  caddy_logs:
