services:
  registry:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://colabbot:colabbot@db:5432/colabbot
      - OFFLINE_THRESHOLD_SECONDS=90
      - CORS_ORIGINS=*
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: colabbot
      POSTGRES_PASSWORD: colabbot
      POSTGRES_DB: colabbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colabbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
